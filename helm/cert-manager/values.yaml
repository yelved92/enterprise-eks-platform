# ==============================================================================
# cert-manager Helm Values
# ==============================================================================
# Deployed via ArgoCD GitOps. Customize settings here.
# ------------------------------------------------------------------------------

cert-manager:
  installCRDs: true
  replicaCount: 1

  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::704489329694:role/dev-cert-manager"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi