apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: enterprise-eks-platform
    app.kubernetes.io/component: security
spec:
  project: platform

  # Multi-source: ESO Helm chart + SecretStore/ExternalSecret manifests
  sources:
    # Source 1: External Secrets Operator Helm chart
    - repoURL: https://charts.external-secrets.io/
      chart: external-secrets
      targetRevision: 0.9.20  # Pinned version for stability
      helm:
        values: |
          # External Secrets Operator configuration
          install:
            # Create CRDs
            crds:
              create: true
            
            # Replica count
            replicaCount: 1
          
          # Enable webhook (required for validation)
          webhook:
            enabled: true
            replicaCount: 1
          
          # Resource limits
          resources:
            limits:
              cpu: 300m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          
          # Disable cert-controller (not needed for basic setup)
          certController:
            enabled: false
          
          # Disable Prometheus metrics (Phase5: no Prometheus yet)
          metrics:
            enabled: false

    # Source 2: Local Git repo with SecretStore + ExternalSecret manifests
    - repoURL: https://github.com/yelved92/enterprise-eks-platform.git
      targetRevision: feat/phase-5-security
      path: security/external-secrets
      directory:
        recurse: true
        include: "*.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
