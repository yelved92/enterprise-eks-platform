"apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: enterprise-eks-platform
    argocd.argoproj.io/app-of-apps: \"true\"
spec:
  project: platform

  source:
    repoURL: \"https://github.com/yelved92/enterprise-eks-platform.git\"
    targetRevision: HEAD
    path: argocd/applications
    directory:
      recurse: true

  destination:
    namespace: argocd
    server: \"https://kubernetes.default.svc\"

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m"