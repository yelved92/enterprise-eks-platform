apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-demo
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/name: opentelemetry-demo
spec:
  project: platform

  # Hybrid Multi-Source Approach:
  # Source 1 = Upstream OTel Demo Helm chart (official Helm repo)
  # Source 2 = Our custom values overrides (version-controlled)
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-demo
      targetRevision: 0.32.0
      helm:
        valueFiles:
          - $values/apps/otel-demo/values.yaml

    - repoURL: https://github.com/yelved92/enterprise-eks-platform.git
      targetRevision: feat/phase-4-argocd
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry-demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
