apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-demo
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/name: opentelemetry-demo
spec:
  project: platform
  
  # Hybrid Approach: Multi-source
  # Source 1 = Upstream OpenTelemetry Demo Helm chart
  # Source 2 = Our custom values overrides (version-controlled)
  sources:
    # Source 1: Upstream OpenTelemetry Demo (official repo)
    - repoURL: https://github.com/open-telemetry/opentelemetry-demo.git
      targetRevision: main  # ← Points to upstream main
      ref: upstream
    
    # Source 2: Our custom values (our feature branch)
    - repoURL: https://github.com/yelved92/enterprise-eks-platform.git
      targetRevision: feat/phase-4-argocd  # ← Points to our feature branch
      path: apps/otel-demo
  
  destination:
    server: https://kubernetes.default.svc
    namespace: otel-demo
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
