apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: enterprise-eks-platform
spec:
  description: "Platform infrastructure and services for the enterprise EKS platform"

  # Allow manifests from the enterprise-eks-platform Git repository
  # and upstream Helm repositories for platform add-ons
  sourceRepos:
    - "https://github.com/yelved92/enterprise-eks-platform.git"
    - "https://charts.jetstack.io"
    - "https://charts.konghq.com"
    - "https://open-telemetry.github.io/opentelemetry-helm-charts"
    # Phase 5: Security Hardening tools
    - "https://kyverno.github.io/kyverno/"
    - "https://falcosecurity.github.io/charts/"
    - "https://charts.external-secrets.io/"
  # Destinations: only this cluster, only platform-managed namespaces
  # cert-manager needs kube-system for leader election roles
  destinations:
    - namespace: argocd
      server: "https://kubernetes.default.svc"
    - namespace: cert-manager
      server: "https://kubernetes.default.svc"
    - namespace: kube-system
      server: "https://kubernetes.default.svc"
    - namespace: kong
      server: "https://kubernetes.default.svc"
    - namespace: opentelemetry-demo
      server: "https://kubernetes.default.svc"
    - namespace: monitoring
      server: "https://kubernetes.default.svc"
    - namespace: istio-system
      server: "https://kubernetes.default.svc"
    - namespace: external-secrets
      server: "https://kubernetes.default.svc"
    # Phase5: Security Hardening tool namespaces
    - namespace: kyverno
      server: "https://kubernetes.default.svc"
    - namespace: falco
      server: "https://kubernetes.default.svc"
    - namespace: test-secrets
      server: "https://kubernetes.default.svc"

  # Cluster-scoped resources required by platform components
  clusterResourceWhitelist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: ""
      kind: Namespace
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: networking.k8s.io
      kind: IngressClass
    - group: certificates.k8s.io
      kind: CertificateSigningRequest
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: cert-manager.io
      kind: Issuer
    - group: cert-manager.io
      kind: Certificate
    - group: acme.cert-manager.io
      kind: Challenge
    - group: acme.cert-manager.io
      kind: Order
    # Phase5: Kyverno CRDs
    - group: kyverno.io
      kind: ClusterPolicy
    - group: kyverno.io
      kind: Policy
    - group: kyverno.io
      kind: ClusterPolicyReport
    - group: kyverno.io
      kind: PolicyReport

  # Namespaced resources — allow everything for platform services
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  # Roles and permissions
  roles:
    - name: platform-admin
      description: "Administrator access to the platform project"
      policies:
        - p, proj:platform:platform-admin, applications, *, platform/*, allow
      groups:
        - platform-admins

  # Default sync policy — all apps auto-sync with self-heal and prune
  syncWindows:
    - kind: allow
      schedule: "* * * * *"
      duration: 1h
      applications:
        - "*"
      clusters:
        - "*"
      namespaces:
        - "*"
      manualSync: true

