# =============================================================================
# External Secrets for Authentik
# =============================================================================
# Secrets are stored in AWS Secrets Manager and synced to Kubernetes
# by the External Secrets Operator (Phase 5C).
# Uses a ClusterSecretStore so it works across all namespaces.
# -----------------------------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: authentik
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager-global
spec:
  provider:
    aws:
      service: Secrets Manager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: test-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-config
  namespace: authentik
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager-global
  target:
    name: authentik-config
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: /authentik/dev/authentik
        property: secret_key
    - secretKey: postgres-password
      remoteRef:
        key: /authentik/dev/authentik
        property: postgres_password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authentik-github-oauth
  namespace: authentik
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager-global
  target:
    name: authentik-github-oauth
    creationPolicy: Owner
  data:
    - secretKey: github-client-id
      remoteRef:
        key: /authentik/dev/github-oauth
        property: client_id
    - secretKey: github-client-secret
      remoteRef:
        key: /authentik/dev/github-oauth
        property: client_secret