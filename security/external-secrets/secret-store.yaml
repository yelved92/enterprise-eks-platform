apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: test-secrets
spec:
  provider:
    aws:
      service: Secrets Manager
      region: us-east-1
      auth:
        # Use IRSA (IAM Role for Service Account)
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: test-secrets
  annotations:
    eks.amazonaws.com/role-arn: ""  # Will be filled after creating IAM role
