apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-core-dns
  namespace: kube-system
spec:
  podSelector:
    k8s-app: kube-dns
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow all pods in the cluster to query DNS
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
  egress:
    # Allow DNS to reach upstream DNS servers (if configured)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow metrics scraping
    - to:
        - namespaceSelector:
            name: monitoring
      ports:
        - protocol: TCP
          port: 9153
