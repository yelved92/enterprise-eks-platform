# =============================================================================
# Terraform Validation Pipeline
# =============================================================================
# Validates all Terraform configurations on pull requests and pushes to main.
#
# Stages:
#   1. Checkout
#   2. Terraform Format Check
#   3. Terraform Init (backend-less)
#   4. Terraform Validate
#   5. Terraform Security Scan (tfsec/checkov)
#   6. Terraform Plan (optional, requires credentials)
# =============================================================================

name: Terraform Validate

on:
  push:
    branches: [master, main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TERRAFORM_VERSION: "1.5.7"
  TF_ROOT: "./terraform"

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_ROOT }}
        continue-on-error: true

      - name: Terraform Init (Backend-less)
        id: init
        run: |
          # Backend-less init for validation only
          # Uses local backend for validation; remote state not needed
          cat > backend.tf.bak <<'EOF'
          # Temporary empty backend for validation
          EOF
          mv backend.tf backend.tf.bak.bak 2>/dev/null || true
          terraform init -backend=false
        working-directory: ${{ env.TF_ROOT }}/environments/${{ matrix.environment }}
        shell: bash

      - name: Terraform Validate
        id: validate
        run: terraform validate
        working-directory: ${{ env.TF_ROOT }}/environments/${{ matrix.environment }}

      - name: Setup TFSec
        uses: aquasecurity/tfsec-action@v1.0.3
        continue-on-error: true
        id: tfsec
        with:
          working_directory: ${{ env.TF_ROOT }}
          format: sarif
          output_file: tfsec-${{ matrix.environment }}.sarif

      - name: Upload TFSec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec-${{ matrix.environment }}.sarif
          category: tfsec-${{ matrix.environment }}

      - name: Setup Checkov
        uses: bridgecrewio/checkov-action@v12
        continue-on-error: true
        id: checkov
        with:
          directory: ${{ env.TF_ROOT }}
          framework: terraform
          output_format: sarif
          output_file_path: checkov-${{ matrix.environment }}.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-${{ matrix.environment }}.sarif
          category: checkov-${{ matrix.environment }}

      - name: Terraform Plan (Optional - Requires AWS Credentials)
        if: github.event_name == 'pull_request'
        id: plan
        run: |
          # Restore original backend config
          mv backend.tf.bak.bak backend.tf 2>/dev/null || true
          terraform init
          terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TF_ROOT }}/environments/${{ matrix.environment }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'success'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_ROOT }}/environments/${{ matrix.environment }}/tfplan', 'utf8');
            const output = `## Terraform Plan (${{ matrix.environment }})\n\n\`\`\`diff\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.substring(0, 65536)
            });

      - name: Summary
        run: |
          echo "## Terraform Validation Results: ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ steps.fmt.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Init | ${{ steps.init.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ steps.validate.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TFSec | ${{ steps.tfsec.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkov | ${{ steps.checkov.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY