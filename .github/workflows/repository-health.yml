# =============================================================================
# Repository Health Check Pipeline
# =============================================================================
# Periodic validation of repository structure, file existence, and best practices.
# Runs on schedule and on push to main.
# =============================================================================

name: Repository Health Check

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  push:
    branches: [master, main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'Project_prompt.md'

permissions:
  contents: read

jobs:
  health-check:
    name: Repository Health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Required Files Exist
        run: |
          required_files=(
            "README.md"
            "docs/project-state.md"
            "docs/progress-log.md"
            "docs/architecture-decisions.md"
            "docs/todo.md"
            ".gitignore"
          )
          missing=0
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              missing=$((missing+1))
            else
              echo "✅ Found: $file"
            fi
          done
          echo ""
          if [ $missing -gt 0 ]; then
            echo "Missing $required file(s)"
            exit 1
          fi
          echo "✅ All required files present"

      - name: Check Required Directories Exist
        run: |
          required_dirs=(
            "terraform"
            "terraform/modules"
            "terraform/environments/dev"
            "terraform/environments/prod"
            "ansible"
            "ansible/playbooks"
            "ansible/inventory"
            "kubernetes"
            "argocd"
            "helm"
            "docs"
            "scripts"
          )
          missing=0
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing directory: $dir"
              missing=$((missing+1))
            else
              echo "✅ Found directory: $dir"
            fi
          done
          echo ""
          if [ $missing -gt 0 ]; then
            echo "Missing $missing directories"
            exit 1
          fi
          echo "✅ All required directories present"

      - name: Check Markdown Files Have No Broken Links
        run: |
          # Simple check for common link patterns
          find . -name "*.md" -type f | while read file; do
            if grep -q '\](http' "$file" 2>/dev/null; then
              echo "📝 $file contains external links (verify manually)"
            fi
          done

      - name: Generate Health Summary
        run: |
          echo "## Repository Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ All checks passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Directory Structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la --tree-level=2 . 2>/dev/null || tree -L 2 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY