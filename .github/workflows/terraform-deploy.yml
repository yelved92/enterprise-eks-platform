# =============================================================================
# Terraform Deploy Pipeline
# =============================================================================
# Applies Terraform changes to target environments after validation.
#
# Safety Features:
#   - Manual approval required for production deploys
#   - Environment isolation (dev vs prod)
#   - Plan before apply
#   - Rollback capability via Git revert
# =============================================================================

name: Terraform Deploy

on:
  push:
    branches: [master, main]
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: "1.5.7"

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev]
        # production deployments require manual trigger or approval
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}/tfplan
          retention-days: 7

  apply:
    name: Apply (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [plan]
    strategy:
      matrix:
        environment: [dev]
      fail-fast: false

    environment:
      name: ${{ matrix.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/environments/${{ matrix.environment }}

      - name: Terraform Init
        id: init
        run: terraform init
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan
        working-directory: terraform/environments/${{ matrix.environment }}

      - name: Post-Apply Summary
        run: |
          echo "## Terraform Apply Complete: ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY