# =============================================================================
# Ansible Lint Pipeline
# =============================================================================
# Lints and validates Ansible playbooks on pull requests and pushes.
# =============================================================================

name: Ansible Lint

on:
  push:
    branches: [master, main]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-lint.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'ansible/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint yamllint

      - name: Run YamlLint
        run: |
          yamllint ansible/

      - name: Run Ansible Lint
        run: |
          ansible-lint ansible/

      - name: Syntax Check Playbooks
        run: |
          ansible-playbook ansible/playbooks/bootstrap.yml --syntax-check
          ansible-playbook ansible/playbooks/validate-environment.yml --syntax-check