# =============================================================================
# Ansible Configuration
# =============================================================================
# Minimal config for local-only Ansible runs (ArgoCD deployment, etc.).
# All operations use connection=local, so SSH/become settings are omitted.
# =============================================================================

[defaults]
# Inventory
inventory = ./inventory/hosts.yml

# Roles and collections
roles_path = ./roles
collections_paths = ./collections

# Local execution (no remote SSH)
transport = local

# Logging
stdout_callback = yaml
callback_whitelist = profile_tasks, timer

# Forks (parallelism)
forks = 10

# Timeout
timeout = 30