# =============================================================================
# Ansible Configuration
# =============================================================================
# Enterprise-grade Ansible configuration for the EKS platform.
# Ansible is used for:
#   - Bootstrap automation (pre-Terraform setup)
#   - Configuration management (post-deployment)
#   - Operational tasks (DR orchestration, upgrade workflows)
#   - Cluster validation and health checks
#
# Terraform vs Ansible Responsibility Split:
#   - Terraform: Infrastructure provisioning (VPC, EKS, IAM, etc.)
#   - Ansible: Configuration management, bootstrapping, operational tasks
# =============================================================================

[defaults]
# Inventory
inventory = ./inventory/hosts.yml

# Remote user for SSH connections
remote_user = ec2-user

# Host key checking (disable for auto-provisioned instances)
host_key_checking = False

# Gathering facts
gathering = smart
fact_caching = jsonfile
fact_caching_connection = ./cache
fact_caching_timeout = 3600

# Roles and collections
roles_path = ./roles
collections_paths = ./collections

# Logging
log_path = ./logs/ansible.log
stdout_callback = yaml
callback_whitelist = profile_tasks, timer

# Error handling
retry_files_enabled = True
retry_files_save_path = ./retry-files

# Forks (parallelism)
forks = 10

# Timeout
timeout = 30

[ssh_connection]
# SSH pipelining for performance
pipelining = True

# Control path for persistent connections
control_path = /tmp/ansible-%%h-%%p-%%r

[privilege_escalation]
# Become for privilege escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False