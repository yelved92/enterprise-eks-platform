# =============================================================================
# Bootstrap Playbook
# =============================================================================
# Pre-Terraform bootstrap automation for the EKS platform.
#
# This playbook handles:
#   1. AWS CLI and tooling verification
#   2. Terraform backend bootstrap (S3 + DynamoDB)
#   3. SSH key pair generation (if needed)
#   4. Local environment validation
#
# Usage:
#   ansible-playbook playbooks/bootstrap.yml -e "environment=dev"
#
# Dependencies:
#   - Ansible 2.14+
#   - AWS CLI installed locally
#   - Python 3.8+
# =============================================================================

---
- name: Bootstrap EKS Platform Environment
  hosts: bootstrap
  gather_facts: yes
  vars:
    environment: "{{ bootstrap_environment }}"
    aws_region: "{{ aws_region }}"
    terraform_backend_bucket: "enterprise-eks-platform-tfstate-{{ account_id }}-{{ aws_region }}"
    dynamodb_lock_table: "terraform-state-lock"

  tasks:
    - name: Display bootstrap configuration
      ansible.builtin.debug:
        msg:
          - "Environment: {{ environment }}"
          - "AWS Region: {{ aws_region }}"
          - "Project: {{ project_name }}"

    - name: Verify AWS CLI is installed
      ansible.builtin.command: aws --version
      register: aws_cli_version
      changed_when: false

    - name: Display AWS CLI version
      ansible.builtin.debug:
        msg: "AWS CLI version: {{ aws_cli_version.stdout }}"

    - name: Verify Terraform is installed
      ansible.builtin.command: terraform --version
      register: terraform_version
      changed_when: false

    - name: Display Terraform version
      ansible.builtin.debug:
        msg: "Terraform version: {{ terraform_version.stdout }}"

    - name: Verify kubectl is installed
      ansible.builtin.command: kubectl version --client --short
      register: kubectl_version
      changed_when: false
      ignore_errors: yes

    - name: Display kubectl version
      ansible.builtin.debug:
        msg: "kubectl version: {{ kubectl_version.stdout | default('Not installed') }}"

    - name: Verify Helm is installed
      ansible.builtin.command: helm version --short
      register: helm_version
      changed_when: false
      ignore_errors: yes

    - name: Display Helm version
      ansible.builtin.debug:
        msg: "Helm version: {{ helm_version.stdout | default('Not installed') }}"

    - name: Get AWS account ID
      ansible.builtin.command: aws sts get-caller-identity --query Account --output text
      register: account_id_result
      changed_when: false

    - name: Set account ID fact
      ansible.builtin.set_fact:
        account_id: "{{ account_id_result.stdout }}"

    - name: Display AWS account information
      ansible.builtin.debug:
        msg:
          - "AWS Account ID: {{ account_id }}"
          - "Backend Bucket: {{ terraform_backend_bucket }}"

    - name: Check if Terraform backend S3 bucket exists
      ansible.builtin.command: >
        aws s3api head-bucket --bucket "{{ terraform_backend_bucket }}"
      register: bucket_check
      changed_when: false
      ignore_errors: yes

    - name: Create Terraform backend S3 bucket
      ansible.builtin.command: >
        aws s3api create-bucket
        --bucket "{{ terraform_backend_bucket }}"
        --region "{{ aws_region }}"
        --acl private
        --create-bucket-configuration LocationConstraint="{{ aws_region }}"
      when: bucket_check is failed and aws_region != 'us-east-1'

    - name: Create Terraform backend S3 bucket (us-east-1)
      ansible.builtin.command: >
        aws s3api create-bucket
        --bucket "{{ terraform_backend_bucket }}"
        --region "{{ aws_region }}"
        --acl private
      when: bucket_check is failed and aws_region == 'us-east-1'

    - name: Enable S3 bucket versioning
      ansible.builtin.command: >
        aws s3api put-bucket-versioning
        --bucket "{{ terraform_backend_bucket }}"
        --versioning-configuration Status=Enabled
      when: bucket_check is failed

    - name: Enable S3 bucket encryption
      ansible.builtin.command: >
        aws s3api put-bucket-encryption
        --bucket "{{ terraform_backend_bucket }}"
        --server-side-encryption-configuration
        '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
      when: bucket_check is failed

    - name: Block public access to S3 bucket
      ansible.builtin.command: >
        aws s3api put-public-access-block
        --bucket "{{ terraform_backend_bucket }}"
        --public-access-block-configuration
        '{"BlockPublicAcls":true,"IgnorePublicAcls":true,"BlockPublicPolicy":true,"RestrictPublicBuckets":true}'
      when: bucket_check is failed

    - name: Check if DynamoDB lock table exists
      ansible.builtin.command: >
        aws dynamodb describe-table --table-name "{{ dynamodb_lock_table }}"
      register: dynamodb_check
      changed_when: false
      ignore_errors: yes

    - name: Create DynamoDB lock table
      ansible.builtin.command: >
        aws dynamodb create-table
        --table-name "{{ dynamodb_lock_table }}"
        --attribute-definitions AttributeName=LockID,AttributeType=S
        --key-schema AttributeName=LockID,KeyType=HASH
        --billing-mode PAY_PER_REQUEST
        --region "{{ aws_region }}"
      when: dynamodb_check is failed

    - name: Wait for DynamoDB table to be active
      ansible.builtin.command: >
        aws dynamodb wait table-exists --table-name "{{ dynamodb_lock_table }}"
      when: dynamodb_check is failed

    - name: Display bootstrap summary
      ansible.builtin.debug:
        msg:
          - "========================================"
          - "  Bootstrap Complete!"
          - "========================================"
          - "S3 Bucket:      {{ terraform_backend_bucket }}"
          - "DynamoDB Table: {{ dynamodb_lock_table }}"
          - "AWS Region:     {{ aws_region }}"
          - ""
          - "Next: Run 'terraform init' in terraform/environments/{{ environment }}/"