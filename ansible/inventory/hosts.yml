# =============================================================================
# Ansible Inventory
# =============================================================================
# Dynamic inventory for EKS platform components.
# In production, this would be dynamically generated or sourced from
# Terraform outputs / AWS APIs.
#
# Group structure:
#   - bootstrap:    Pre-Terraform bootstrap targets
#   - management:   Management/bastion hosts
#   - eks_clusters: EKS cluster management endpoints
#   - monitoring:   Monitoring infrastructure
# =============================================================================

all:
  children:
    bootstrap:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3
      vars:
        bootstrap_environment: "{{ lookup('env', 'ENVIRONMENT') | default('dev', true) }}"
        aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}"

    management:
      hosts: {}
      # Management/bastion hosts would be populated dynamically
      # or via Terraform outputs in production

    eks_clusters:
      children:
        blue_cluster:
          hosts: {}
        green_cluster:
          hosts: {}
      vars:
        kubernetes_version: "1.28"
        cluster_autoscaler_enabled: true

    monitoring:
      hosts: {}
      # Prometheus, Grafana, etc. endpoints

  vars:
    # Global variables
    ansible_user: "{{ lookup('env', 'ANSIBLE_USER') | default('ec2-user', true) }}"
    environment: "{{ lookup('env', 'ENVIRONMENT') | default('dev', true) }}"
    aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}"
    project_name: "enterprise-eks-platform"