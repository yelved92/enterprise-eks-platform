# -----------------------------------------------------------------------------
# OpenTelemetry Demo — Custom Values Overrides
# -----------------------------------------------------------------------------
# Hybrid GitOps: overrides upstream chart values for dev environment.
# Only values we want to override are included; everything else falls through
# to upstream defaults.
# -----------------------------------------------------------------------------

# -- Global defaults applied to all components
default:
  # Reduce replica count for dev
  replicas: 1

# -- Component-level overrides
# Disable optional/infrastructure services to reduce resource consumption in dev
components:
  # Frontend (keep enabled — this is the demo UI)
  frontend:
    enabled: true
    resources:
      limits:
        memory: 128Mi

  frontendProxy:
    enabled: true
    resources:
      limits:
        memory: 48Mi

  # Core demo services
  adService:
    enabled: true
    resources:
      limits:
        memory: 64Mi

  cartService:
    enabled: true
    resources:
      limits:
        memory: 80Mi

  checkoutService:
    enabled: true
    resources:
      limits:
        memory: 20Mi

  currencyService:
    enabled: true
    resources:
      limits:
        memory: 20Mi

  emailService:
    enabled: true
    resources:
      limits:
        memory: 48Mi

  paymentService:
    enabled: true
    resources:
      limits:
        memory: 64Mi

  productCatalogService:
    enabled: true
    resources:
      limits:
        memory: 20Mi

  quoteService:
    enabled: true
    resources:
      limits:
        memory: 32Mi

  recommendationService:
    enabled: true
    resources:
      limits:
        memory: 128Mi

  shippingService:
    enabled: true
    resources:
      limits:
        memory: 20Mi

  frauddetectionService:
    enabled: true
    resources:
      limits:
        memory: 64Mi

  imageprovider:
    enabled: true
    resources:
      limits:
        memory: 48Mi

  accountingService:
    enabled: true
    resources:
      limits:
        memory: 48Mi

  # Disable load generator (not needed for validation)
  loadgenerator:
    enabled: false

  # Disable Flagd (feature flags — optional)
  flagd:
    enabled: false

  # Disable Kafka + Valkey (heavy infrastructure — not needed for core demo)
  kafka:
    enabled: false
  valkey:
    enabled: false

# -- OpenTelemetry Collector
opentelemetry-collector:
  enabled: true
  resources:
    limits:
      memory: 128Mi

# -- Disable observability infrastructure (we deploy our own in Phase 7)
jaeger:
  enabled: false

prometheus:
  enabled: false

grafana:
  enabled: false

opensearch:
  enabled: false
