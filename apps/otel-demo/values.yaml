# -----------------------------------------------------------------------------
# OpenTelemetry Demo — Custom Values Overrides
# -----------------------------------------------------------------------------
# Hybrid GitOps approach:
# - Upstream chart: https://open-telemetry.github.io/opentelemetry-helm-charts
# - Downstream overrides: this file (version-controlled in our repo)
#
# This overrides specific upstream values for our dev environment.
# See the full upstream schema at:
#   https://github.com/open-telemetry/opentelemetry-helm-charts/blob/main/charts/opentelemetry-demo/values.yaml
# -----------------------------------------------------------------------------

# -- Global environment variables applied to all components
default:
  env:
    - name: OTEL_COLLECTOR_NAME
      value: opentelemetry-demo-otel-collector

# -- OpenTelemetry Collector configuration
opentelemetry-collector:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# -- Individual service settings
# Enable only core demo services; disable optional components
# to speed up deployment in dev and reduce resource consumption
deployment:
  # Core frontend
  frontend:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  productCatalog:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  recommendation:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  cart:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  checkout:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  currency:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  payment:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  shipping:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  ad:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 150m
        memory: 192Mi

  # Disable optional components for faster dev deployment
  loadGenerator:
    enabled: false

  imageProvider:
    enabled: false

  kafka:
    enabled: false

  flagd:
    enabled: false

# -- Ingress (disabled for now; can enable to expose the demo frontend)
ingress:
  enabled: false

# -- Grafana (disabled — we'll deploy our own observability stack in Phase 7)
grafana:
  enabled: false

# -- Prometheus (disabled — will be deployed independently in Phase 7)
prometheus:
  enabled: false
